name: 'Release Build'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Load Private Key
        shell: python
        run: |
          import os
          import uuid
          with open("src-tauri/updater.key", "rb") as f:
              key_data = f.read().replace(b"\r\n", b"\n")
          env_file = os.environ.get("GITHUB_ENV")
          delimiter = "EOF_" + uuid.uuid4().hex
          with open(env_file, "a", encoding="utf-8") as f:
              f.write(f"TAURI_PRIVATE_KEY<<{delimiter}\n")
          with open(env_file, "ab") as f:
              f.write(key_data)
              if not key_data.endswith(b"\n"):
                  f.write(b"\n")
          with open(env_file, "a", encoding="utf-8") as f:
              f.write(f"{delimiter}\n")

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: 'Gradus Renamer v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
